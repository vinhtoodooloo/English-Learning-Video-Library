<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Learning Library - o9o Style</title>
    <style>
        :root {
            --primary-blue: #0072bc;
            --dark-blue: #005a96;
            --light-bg: #f4f7f9;
            --text-color: #333;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0; background-color: var(--light-bg);
            color: var(--text-color);
        }

        /* Nav chính */
        .main-nav {
            background-color: var(--primary-blue);
            display: flex; justify-content: center;
            padding: 0;
        }
        .main-nav a {
            color: white; text-decoration: none; padding: 15px 25px;
            font-weight: bold; text-transform: uppercase; font-size: 14px;
        }
        .main-nav a:hover, .main-nav a.active { background: var(--dark-blue); }

        /* Nav Grade (Cấp 2) */
        .sub-nav {
            background-color: #e9ecef;
            display: flex; justify-content: center;
            flex-wrap: wrap; padding: 5px 0;
            border-bottom: 1px solid #dee2e6;
        }
        .sub-nav a {
            color: var(--primary-blue); text-decoration: none; padding: 8px 15px;
            font-size: 13px; font-weight: 600; margin: 2px;
            border-radius: 4px; transition: 0.2s;
        }
        .sub-nav a:hover, .sub-nav a.active { background: var(--primary-blue); color: white; }

        .container { max-width: 1000px; margin: 20px auto; background: white; padding: 20px; box-shadow: 0 0 15px rgba(0,0,0,0.05); }

        /* Video Section */
        .video-header { font-size: 18px; margin-bottom: 10px; font-weight: normal; }
        .video-wrapper { width: 100%; position: relative; padding-bottom: 56.25%; height: 0; background: #000; margin-bottom: 15px; }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        /* Skill Grid (3 cột giống o9o) */
        .skill-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 25px; }
        .skill-btn { 
            background: #f1f3f5; border: 1px solid #e9ecef; padding: 10px; 
            text-align: left; cursor: pointer; border-radius: 4px; font-size: 14px; color: #666;
        }
        .skill-btn:hover { background: #e9ecef; }
        .skill-btn.active { background: #007bff; color: white; border-color: #007bff; }

        /* Lesson Grid (Dưới cùng) */
        .lesson-title { border-top: 1px solid #eee; padding-top: 20px; margin-top: 20px; font-size: 18px; }
        .lesson-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(45px, 1fr)); gap: 5px; margin-top: 15px; }
        .lesson-box {
            background: #007bff; color: white; height: 35px;
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; cursor: pointer; border-radius: 3px; font-weight: bold;
        }
        .lesson-box:hover { background: #333; }
        .lesson-box.active { background: #ffc107; color: #333; }

        #loading { text-align: center; padding: 50px; display: none; font-style: italic; color: #888; }
    </style>
</head>
<body>

    <nav class="main-nav" id="main-menu">
        <a href="#" onclick="changeSource('ABEKA')" id="nav-abeka">ABEKA</a>
        <a href="#" onclick="changeSource('LITTLEFOX')" id="nav-littlefox">LITTLE FOX</a>
        <a href="#" onclick="changeSource('SINGLESTORY')" id="nav-singlestory">SINGLE STORY</a>
    </nav>

    <nav class="sub-nav" id="grade-menu"></nav>

    <div class="container">
        <div id="loading">Đang tải dữ liệu...</div>

        <div id="display-area" style="display:none;">
            <div class="video-header" id="current-info">Ngày ..., lớp ...</div>
            
            <div class="video-wrapper">
                <div id="player"></div>
            </div>

            <div class="skill-grid" id="skill-list"></div>

            <div class="lesson-title" id="grid-title">Video bài giảng theo ngày học:</div>
            <div class="lesson-grid" id="lesson-list"></div>
        </div>
    </div>

    <script>
        const API_KEY = 'AIzaSyC8Pfnocm6rFoEuMv959m4NzkZUMyS_I20';
        const SOURCES = {
            'ABEKA': '1wkV7rBm47KjwtXrv3-0_ZOJ4f3BW1S2Y',
            'LITTLEFOX': '19lKtrcn5wTCvPDqx6_pq5iMT9oYjZp2v',
            'SINGLESTORY': '1mg7mVfYXwRrbxiujLchd5oZOg8DUN1oh'
        };

        let currentSource = 'ABEKA';
        let currentGradeName = '';

        async function changeSource(key) {
            currentSource = key;
            document.querySelectorAll('.main-nav a').forEach(a => a.classList.remove('active'));
            document.getElementById(`nav-${key.toLowerCase()}`).classList.add('active');
            
            const folderId = SOURCES[key];
            await loadGrades(folderId);
        }

        async function loadGrades(folderId) {
            showLoading(true);
            try {
                const url = `https://www.googleapis.com/drive/v3/files?q='${folderId}'+in+parents+and+trashed=false&key=${API_KEY}`;
                const res = await fetch(url);
                const data = await res.json();
                const grades = data.files.sort((a,b) => a.name.localeCompare(b.name, undefined, {numeric: true}));
                
                const menu = document.getElementById('grade-menu');
                menu.innerHTML = grades.map(g => `<a href="#" onclick="selectGrade('${g.id}', '${g.name}', this)">${g.name}</a>`).join('');
                
                if(grades.length > 0) selectGrade(grades[0].id, grades[0].name, menu.firstChild);
            } catch (e) { console.error(e); }
        }

        async function selectGrade(id, name, el) {
            showLoading(true);
            currentGradeName = name;
            document.querySelectorAll('.sub-nav a').forEach(a => a.classList.remove('active'));
            if(el) el.classList.add('active');

            try {
                const url = `https://www.googleapis.com/drive/v3/files?q='${id}'+in+parents+and+trashed=false&key=${API_KEY}`;
                const res = await fetch(url);
                const data = await res.json();
                const lessons = data.files.sort((a,b) => a.name.localeCompare(b.name, undefined, {numeric: true}));
                
                const list = document.getElementById('lesson-list');
                document.getElementById('grid-title').innerText = `Video bài giảng ${currentSource} ${name} theo ngày học:`;
                list.innerHTML = lessons.map(l => `<div class="lesson-box" onclick="loadLesson('${l.id}', '${l.name}', this)">${l.name.replace(/\D/g,'')}</div>`).join('');
                
                if(lessons.length > 0) loadLesson(lessons[0].id, lessons[0].name, list.firstChild);
            } catch (e) { console.error(e); }
        }

        async function loadLesson(id, name, el) {
            document.querySelectorAll('.lesson-box').forEach(b => b.classList.remove('active'));
            if(el) el.classList.add('active');
            
            document.getElementById('display-area').style.display = 'block';
            document.getElementById('current-info').innerText = `Ngày ${name.replace(/\D/g,'')}, lớp ${currentGradeName.replace(/\D/g,'')}`;

            try {
                const url = `https://www.googleapis.com/drive/v3/files?q='${id}'+in+parents+and+trashed=false&key=${API_KEY}`;
                const res = await fetch(url);
                const data = await res.json();
                const skills = data.files.sort((a,b) => a.name.localeCompare(b.name));
                
                const skillGrid = document.getElementById('skill-list');
                skillGrid.innerHTML = skills.map((s, i) => `
                    <div class="skill-btn ${i===0?'active':''}" onclick="playVideo('${s.id}', this)">
                        ${s.name.split('.')[0]}
                    </div>
                `).join('');
                
                if(skills.length > 0) playVideo(skills[0].id);
            } catch (e) { console.error(e); }
            showLoading(false);
        }

        function playVideo(id, btn) {
            if(btn) {
                document.querySelectorAll('.skill-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            }
            document.getElementById('player').innerHTML = `<iframe src="https://drive.google.com/file/d/${id}/preview" allow="autoplay" allowfullscreen></iframe>`;
        }

        function showLoading(s) { document.getElementById('loading').style.display = s ? 'block' : 'none'; }

        // Khởi tạo mặc định
        changeSource('ABEKA');
    </script>
</body>
</html>
